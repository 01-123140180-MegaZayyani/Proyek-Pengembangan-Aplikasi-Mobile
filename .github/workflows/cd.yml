name: CD – Release

on:
  push:
    tags:
      - 'v*.*.*'   # trigger hanya saat push tag seperti v1.0.0

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build & Sign Release AAB ───────────────────────────────────────────
  build-aab:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    outputs:
      aab-path: ${{ steps.find-aab.outputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > androidApp/masakuy-release.jks

      - name: Build Release AAB
        env:
          SIGNING_STORE_FILE:     androidApp/masakuy-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Find AAB path
        id: find-aab
        run: |
          AAB=$(find androidApp/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: ${{ steps.find-aab.outputs.path }}
          retention-days: 30

      - name: Clean up Keystore
        if: always()
        run: rm -f androidApp/masakuy-release.jks

  # ── 2. Distribute ke Firebase App Distribution (QA / Internal) ───────────
  distribute-firebase:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-aab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: dist/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups:      internal-testers
          releaseNotes: |
            Tag: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          file: dist/*.aab

  # ── 3. Publish ke Google Play (Internal Track) ────────────────────────────
  publish-play-store:
    name: Publish to Play Store (Internal)
    runs-on: ubuntu-latest
    needs: build-aab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: dist/

      - name: Upload to Play Store – Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName:      com.example.masakuy
          releaseFiles:     dist/*.aab
          track:            internal
          status:           completed
          whatsNewDirectory: distribution/whatsnew   # opsional, buat folder ini jika ada release notes

  # ── 4. Create GitHub Release ──────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-aab
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Masakuy ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.aab